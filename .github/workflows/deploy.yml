name: Deploy Cloud Native Inventory Platform

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment Environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set Deployment Environment
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ENVIRONMENT=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
          fi

      - name: Get EC2 Public IP
        run: |
          EC2_IP=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=${ENVIRONMENT}-inventory-server" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)

          echo "EC2_IP=$EC2_IP" >> $GITHUB_ENV

      - name: Generate Ansible Inventory
        run: |
          chmod +x ansible/scripts/generate_inventory.sh
          ./ansible/scripts/generate_inventory.sh $ENVIRONMENT $EC2_IP

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/project.pem
          chmod 600 ~/.ssh/project.pem

      - name: Add EC2 to Known Hosts
        run: |
          ssh-keyscan -H $EC2_IP >> ~/.ssh/known_hosts

      - name: Clone or Update Repository on EC2
        run: |
          ssh -i ~/.ssh/project.pem ubuntu@$EC2_IP << 'EOF'

          if [ ! -d "/opt/cloud-native-inventory-platform/.git" ]; then
              sudo git clone https://github.com/hs2002-18/Cloud-Native-Inventory-Platform.git /opt/cloud-native-inventory-platform
              sudo chown -R ubuntu:ubuntu /opt/cloud-native-inventory-platform
          else
              cd /opt/cloud-native-inventory-platform
              git pull origin main
          fi

          EOF

      - name: Run Ansible Playbook
        run: |
          cd ansible
          ansible-playbook playbooks/site.yml
