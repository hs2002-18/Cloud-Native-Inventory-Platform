apiVersion: v1
kind: Service

metadata:
  name: {{ include "inventory-platform.fullname" . }}
  labels:
    {{- include "inventory-platform.labels" . | nindent 4 }}

spec:
  type: {{ .Values.service.type }}

  selector:
    {{- include "inventory-platform.selectorLabels" . | nindent 4 }}

  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http