replicaCount: 1

image:
  repository: inventory-platform
  tag: v1
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

config:
  appName: "Inventory-Platform"
  appVersion: "1.0.0"
  databaseName: "inventory.db"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"

  limits:
    cpu: "500m"
    memory: "512Mi"
  
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: "/metrics"
  prometheus.io/port: "8000"

podLabels: {}