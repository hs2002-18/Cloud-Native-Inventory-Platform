---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade packages
  apt:
    upgrade: dist

- name: Install common packages
  apt:
    name:
      - git
      - curl
      - wget
      - unzip
      - python3
      - python3-pip
      - ca-certificates
      - apt-transport-https
      - software-properties-common
      - gnupg
      - lsb-release
    state: present