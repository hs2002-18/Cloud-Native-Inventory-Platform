---
- name: Download Kubernetes GPG key
  get_url:
    url: https://pkgs.k8s.io/core:/stable:/v1.34/deb/Release.key
    dest: /tmp/kubernetes.asc
    mode: '0644'

- name: Convert Kubernetes GPG key
  command: >
    gpg --dearmor
    -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    /tmp/kubernetes.asc
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Add Kubernetes repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.34/deb/ /"
    filename: kubernetes
    state: present

- name: Update apt cache
  apt:
    update_cache: yes

- name: Install kubectl
  apt:
    name: kubectl
    state: present

- name: Hold kubectl version
  dpkg_selections:
    name: kubectl
    selection: hold

- name: Verify kubectl
  command: kubectl version --client
  register: kubectl_version
  changed_when: false

- name: Show kubectl version
  debug:
    var: kubectl_version.stdout